site_name: NeuroLight Meeting Notes
site_description: Meeting notes and project documentation for the NeuroLight capstone team
site_url: https://neurolight.ajmastrangelo.dev/
repo_url: https://github.com/ajmastra/neurolight-notes
repo_name: neurolight-notes
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Meeting Notes:
    - January 26, 2026: NeuroLight Team Meeting 01.md
    - February 2, 2026: NeuroLight Team Meeting 02.md
    - April 6, 2026: NeuroLight Team Meeting 03.md
    - April 13, 2026: NeuroLight Team Meeting 04.md
    - April 20, 2026: NeuroLight Team Meeting 05.md

plugins:
  - search:
      lang: en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Neuro-Light/neurolight-workbench
      name: NeuroLight on GitHub
